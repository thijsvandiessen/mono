packages:
  - apps/**/*
  - packages/**/*
  - e2e

allowBuilds:
  '@apollo/rover': true
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  sharp: true
  unrs-resolver: true
  yarn: set this to true or false

ignoredBuiltDependencies:
  - '@apollo/rover'
  - '@swc/core'

onlyBuiltDependencies:
  - '@parcel/watcher'
  - esbuild
  - sharp
  - unrs-resolver
